<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0b0f19"/>
  <!-- Circular Rings (Offsets) -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#6366f1" stroke-width="6" stroke-dasharray="16 16" opacity="0.3"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#6366f1" stroke-width="4" stroke-dasharray="12 12" opacity="0.5"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="#6366f1" stroke-width="3" stroke-dasharray="8 8" opacity="0.7"/>
  <!-- Globe Grid Lines -->
  <path d="M 256,40 A 216,216 0 0,0 256,472" fill="none" stroke="#1e293b" stroke-width="4"/>
  <path d="M 256,40 A 216,216 0 0,1 256,472" fill="none" stroke="#1e293b" stroke-width="4"/>
  <line x1="40" y1="256" x2="472" y2="256" stroke="#1e293b" stroke-width="4"/>
  <!-- Glowing Coastline Path -->
  <path d="M 120,380 C 180,390 220,320 250,280 C 280,240 310,240 360,200 C 410,160 400,100 440,80" fill="none" stroke="#0ea5e9" stroke-width="12" stroke-linecap="round" filter="drop-shadow(0px 0px 8px #0ea5e9)"/>
  <!-- Offset Sea Path -->
  <path d="M 150,420 C 210,430 250,360 280,320 C 310,280 340,280 390,240 C 440,200 430,140 470,120" fill="none" stroke="#f59e0b" stroke-width="6" stroke-dasharray="10 10" stroke-linecap="round" opacity="0.8"/>
  <!-- Active Marker Point -->
  <circle cx="250" cy="280" r="14" fill="#ef4444"/>
</svg>
